<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.card-hover{transition:transform .22s ease,box-shadow .22s ease}
.card-hover:hover{transform:translateY(-3px) scale(1.003);box-shadow:0 12px 28px rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.04)}
.card-hover:active{transform:translateY(0) scale(0.995);box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.btn-primary{transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3);filter:brightness(1.08)}
.btn-primary:active{transform:translateY(0) scale(0.97)}
.btn-success-h{transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}
.btn-success-h:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,0.25);filter:brightness(1.08)}
.btn-success-h:active{transform:translateY(0) scale(0.97)}
.btn-danger-h{transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}
.btn-danger-h:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(220,38,38,0.2);filter:brightness(1.08)}
.btn-danger-h:active{transform:translateY(0) scale(0.97)}
.btn-purple-h{transition:transform .2s ease,box-shadow .2s ease,filter .2s ease}
.btn-purple-h:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.25);filter:brightness(1.08)}
.btn-purple-h:active{transform:translateY(0) scale(0.97)}
.btn-ghost{transition:background .2s ease,transform .15s ease}
.btn-ghost:hover{background:rgba(0,0,0,0.04);transform:scale(1.02)}
.btn-ghost:active{transform:scale(0.96);opacity:0.7}
.btn-action{transition:transform .15s ease,background .15s ease;border-radius:10px}
.btn-action:hover{background:rgba(0,0,0,0.05);transform:scale(1.15)}
.btn-action:active{transform:scale(0.9)}
.fab-hover{transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s ease}
.fab-hover:hover{transform:scale(1.08) rotate(90deg);box-shadow:0 10px 30px rgba(37,99,235,0.4)}
.fab-hover:active{transform:scale(0.95) rotate(90deg)}
.nav-btn{transition:transform .2s ease,color .2s ease;position:relative}
.nav-btn:hover{transform:translateY(-2px)}
.nav-btn:active{transform:translateY(0) scale(0.92)}
.sel-hover{transition:border-color .2s ease,box-shadow .2s ease}
.sel-hover:hover{border-color:rgba(37,99,235,0.3);box-shadow:0 2px 12px rgba(37,99,235,0.08)}
.sel-hover:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.inp-glow{transition:border-color .2s ease,box-shadow .2s ease}
.inp-glow:focus{border-color:#2563eb !important;box-shadow:0 0 0 3px rgba(37,99,235,0.1) !important}
.met-hover{transition:transform .2s ease,box-shadow .2s ease}
.met-hover:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.06)}
/* Metric cards - compact on mobile */
.metrics-row{display:flex;gap:10px}
@media(max-width:399px){.metrics-row{gap:6px}}
.metrics-row .met-hover{padding:12px 8px}
@media(min-width:400px){.metrics-row .met-hover{padding:14px 12px}}

/* Responsive grid */
.rg{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:600px){.rg-2{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.rg-3{grid-template-columns:repeat(3,1fr)}}

/* Form 2-col on desktop */
.form-grid{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:600px){.form-grid{grid-template-columns:1fr 1fr;gap:0 20px}}

/* Sidebar: desktop only */
.desktop-sidebar{display:none}
@media(min-width:769px){.desktop-sidebar{display:flex !important}}

/* Mobile nav: mobile/tablet only */
.mobile-nav{display:block}
@media(min-width:769px){.mobile-nav{display:none !important}}
.mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;padding:4px 0 2px}
.mobile-nav-inner button{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0 4px;border:none;background:none;cursor:pointer;font-family:inherit;gap:2px;position:relative}
.mobile-nav-inner button span.nav-icon{font-size:22;line-height:1}
.mobile-nav-inner button span.nav-label{font-size:9px;font-weight:700;letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px}

/* Main content margin */
.main-content{margin-left:0;padding:14px 14px 90px}
@media(min-width:400px){.main-content{padding:16px 16px 96px}}
@media(min-width:769px){.main-content{margin-left:220px;padding:32px 40px 40px}}
@media(min-width:1100px){.main-content{padding:32px 56px 40px}}

/* Modal: bottom sheet on mobile, center on desktop */
.modal-inner-mobile{position:fixed;left:0;right:0;bottom:0;border-radius:24px 24px 0 0;max-height:88vh}
@media(min-width:600px){.modal-inner-mobile{position:fixed;left:50%;top:50%;bottom:auto;right:auto;transform:translate(-50%,-50%);border-radius:24px;max-height:85vh;width:95%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,0.2)}}
.modal-wide{max-width:520px}
@media(min-width:600px){.modal-wide{max-width:720px !important}}

/* FAB position */
.fab-pos{bottom:76px;right:16px}
@media(min-width:769px){.fab-pos{bottom:24px;right:24px}}

/* Dark overrides */
.dark .card-hover:hover{box-shadow:0 12px 28px rgba(0,0,0,0.25)}
.dark .btn-ghost:hover{background:rgba(255,255,255,0.06)}
.dark .btn-action:hover{background:rgba(255,255,255,0.08)}
.dark .inp-glow:focus{border-color:#60a5fa !important;box-shadow:0 0 0 3px rgba(96,165,250,0.15) !important}
.dark .sel-hover:hover{border-color:rgba(96,165,250,0.3);box-shadow:0 2px 12px rgba(96,165,250,0.1)}
</style>

let USERS=[{username:"Raja",password:"9393723555",name:"Raja"},{username:"Sasank",password:"9440032636",name:"Sasank"}];

const sheet={
  ok:()=>!!GAS_URL,

const generatePDF=(partyName,partyType,partyCity,txns,year,getName,getParty,cfg)=>{
  const isW=partyType==="w";
  const rows=txns.map(t=>{const o=getParty(isW?"r":"w",isW?t.retailerId:t.wholesalerId);return{date:t.date||"",party:o?.name||"—",location:o?.location||"—",product:t.product||"",qty:t.quantity||t.qty||0};});
  const tot=rows.reduce((s,r)=>s+Number(r.qty),0);
  const tr=rows.map((r,i)=>'<tr style="border-bottom:1px solid #e2e8f0"><td style="padding:10px 8px;text-align:center">'+(i+1)+'</td><td style="padding:10px 8px">'+r.date+'</td><td style="padding:10px 8px;font-weight:600">'+r.party+'</td><td style="padding:10px 8px">'+r.location+'</td><td style="padding:10px 8px">'+r.product+'</td><td style="padding:10px 8px;text-align:right">'+r.qty+' T</td></tr>').join("");
  const html='<html><head><title>Statement-'+partyName+'</title><style>@media print{body{margin:0}@page{margin:20mm}}body{font-family:sans-serif;color:#0f172a;padding:32px;max-width:800px;margin:0 auto}td,th{font-size:13px}</style></head><body><div style="text-align:center;margin-bottom:32px"><div style="font-size:24px;font-weight:900;color:#2563eb">🌾 '+cfg.biz+'</div>'+(cfg.owner?'<div style="font-size:14px;color:#64748b;margin-top:4px">'+cfg.owner+'</div>':'')+'<div style="font-size:13px;color:#94a3b8;margin-top:4px">Transaction Statement — FY '+year+'</div></div><div style="background:#f1f5f9;border-radius:12px;padding:16px;margin-bottom:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px"><div><div style="font-size:12px;color:#64748b;font-weight:600">Party</div><div style="font-size:16px;font-weight:800">'+partyName+'</div></div><div><div style="font-size:12px;color:#64748b;font-weight:600">Type</div><div style="font-size:14px;font-weight:600">'+(isW?"Wholesaler":"Retailer")+'</div></div>'+(partyCity?'<div><div style="font-size:12px;color:#64748b;font-weight:600">City</div><div style="font-size:14px;font-weight:600">'+partyCity+'</div></div>':'')+'<div><div style="font-size:12px;color:#64748b;font-weight:600">Txns</div><div style="font-size:14px;font-weight:600">'+rows.length+'</div></div></div><table style="width:100%;border-collapse:collapse;margin-bottom:24px"><thead><tr style="background:#2563eb;color:#fff"><th style="padding:12px 8px;text-align:center;border-radius:8px 0 0 0">#</th><th style="padding:12px 8px;text-align:left">Date</th><th style="padding:12px 8px;text-align:left">Party</th><th style="padding:12px 8px;text-align:left">Location</th><th style="padding:12px 8px;text-align:left">Product</th><th style="padding:12px 8px;text-align:right;border-radius:0 8px 0 0">Qty</th></tr></thead><tbody>'+tr+'</tbody><tfoot><tr style="background:#f1f5f9;font-weight:800"><td colspan="5" style="padding:12px 8px;border-radius:0 0 0 8px">TOTAL</td><td style="padding:12px 8px;text-align:right;border-radius:0 0 8px 0">'+tot+' T</td></tr></tfoot></table><div style="margin-top:48px;display:flex;justify-content:space-between;padding-top:24px;border-top:2px solid #e2e8f0"><div style="text-align:center"><div style="border-top:2px solid #0f172a;padding-top:8px;font-size:13px;font-weight:600;min-width:160px">Authorized Signature</div></div><div style="text-align:center"><div style="border-top:2px solid #0f172a;padding-top:8px;font-size:13px;font-weight:600;min-width:160px">Party Signature</div></div></div><div style="text-align:center;margin-top:32px;font-size:11px;color:#94a3b8">Generated '+new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"})+' | '+cfg.biz+'</div></body></html>';
  const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);}
};

const ModalShell=({open,title,onClose,children,bg,borderC,textC,mutedC,bgC,wide})=>{
  if(!open)return null;
  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999}}>
      <div onClick={onClose} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:9999}}></div>
      <div className={"modal-inner-mobile"+(wide?" modal-wide":"")} style={{background:bgC||"#fff",display:"flex",flexDirection:"column",zIndex:10000}}>
        <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+(borderC||"#e2e8f0"),flexShrink:0}}>
          <span style={{fontWeight:800,fontSize:18,color:textC||"#0f172a"}}>{title}</span>
          <button type="button" onClick={onClose} style={{width:36,height:36,borderRadius:99,border:"none",background:bg||"#f1f5f9",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:mutedC||"#64748b"}}>✕</button>
        </div>
        <div style={{padding:20,overflowY:"auto",flex:1,WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>{children}</div>
      </div>
    </div>
  );
};

const SearchSelect=({label,options,value,onChange,theme})=>{
  const[open,setOpen]=useState(false);
  const[sq,setSq]=useState("");
  const ref=useRef(null);
  const inputRef=useRef(null);
  const selected=options.find(o=>o.v===value);
  const filtered=options.filter(o=>o.l.toLowerCase().includes(sq.toLowerCase())||(o.loc||"").toLowerCase().includes(sq.toLowerCase()));
  useEffect(()=>{const h=(e)=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setSq("");}};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};},[]);
  useEffect(()=>{if(open&&inputRef.current)inputRef.current.focus();},[open]);
  const $=theme;
  return(
    <div style={{marginBottom:16}} ref={ref}>
      <label style={{display:"block",fontSize:13,fontWeight:600,color:$.muted,marginBottom:6}}>{label}</label>
      <div style={{position:"relative"}}>
        <div onClick={()=>{setOpen(!open);setSq("");}} style={{width:"100%",border:"1.5px solid "+(open?$.primary:$.border),borderRadius:open?"12px 12px 0 0":"12px",padding:"14px 16px",fontSize:16,boxSizing:"border-box",fontFamily:"inherit",background:$.dark?"#1a1f30":$.card,color:selected?$.text:$.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"border-color .2s,box-shadow .2s",boxShadow:open?"0 0 0 3px "+$.primary+"1a":"none"}}>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selected?selected.l:"Choose..."}</span>
          <span style={{fontSize:12,color:$.muted,flexShrink:0,marginLeft:8,transform:open?"rotate(180deg)":"rotate(0)",transition:"transform .2s"}}>▼</span>
        </div>
        {open&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:$.dark?"#1a1f30":$.card,border:"1.5px solid "+$.primary,borderTop:"none",borderRadius:"0 0 12px 12px",zIndex:100,boxShadow:"0 12px 32px rgba(0,0,0,0.15)",overflow:"hidden"}}>
          <div style={{padding:"8px 10px",borderBottom:"1px solid "+$.border}}>
            <input ref={inputRef} value={sq} onChange={e=>setSq(e.target.value)} placeholder="Search..." style={{width:"100%",border:"1.5px solid "+$.border,borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:$.bg,color:$.text}} onClick={e=>e.stopPropagation()}/>
          </div>
          <div style={{maxHeight:180,overflowY:"auto",overscrollBehavior:"contain"}}>
            {filtered.length===0?<div style={{padding:"14px 16px",fontSize:14,color:$.muted,textAlign:"center"}}>No matches</div>:
            filtered.map(o=><div key={o.v} onClick={(e)=>{e.stopPropagation();onChange(o.v);setOpen(false);setSq("");}} style={{padding:"12px 16px",fontSize:15,color:$.text,cursor:"pointer",background:o.v===value?($.primary+"18"):"transparent",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+$.border+"80"}} onMouseEnter={e=>e.currentTarget.style.background=o.v===value?($.primary+"22"):($.bg)} onMouseLeave={e=>e.currentTarget.style.background=o.v===value?($.primary+"18"):"transparent"}>
              <div style={{minWidth:0,overflow:"hidden"}}><div style={{fontWeight:o.v===value?700:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.l}</div>{o.loc&&<div style={{fontSize:12,color:$.muted,marginTop:2}}>📍 {o.loc}</div>}</div>
              {o.v===value&&<span style={{color:$.primary,fontSize:16,flexShrink:0,marginLeft:8}}>✓</span>}
            </div>)}
          </div>
        </div>}
      </div>
    </div>
  );
};

function App(){
  const[loggedIn,setLoggedIn]=useState(false);
  const[loginUser,setLoginUser]=useState("");
  const[loginPass,setLoginPass]=useState("");
  const[loginErr,setLoginErr]=useState("");
  const[currentUser,setCurrentUser]=useState(null);
  const[dark,setDark]=useState(false);
  const[W,setW]=useState([]);
  const[R,setR]=useState([]);
  const[T,setT]=useState([]);
  const[cfg,setCfg]=useState({biz:"Fertilizer Brokerage",owner:"",wRate:50,rRate:50});
  const[tab,setTab]=useState("home");
  const[form,setForm]=useState(null);
  const[edit,setEdit]=useState(null);
  const[q,setQ]=useState("");
  const[yr,setYr]=useState(String(new Date().getFullYear()));
  const[detail,setDetail]=useState(null);
  const[toast,setToast]=useState("");
  const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);
  const[bulkText,setBulkText]=useState("");
  const[bulkPreview,setBulkPreview]=useState([]);
  const[bulkImporting,setBulkImporting]=useState(false);
  const[editProfile,setEditProfile]=useState(false);
  const[profName,setProfName]=useState("");
  const[oldPw,setOldPw]=useState("");
  const[newPw,setNewPw]=useState("");
  const[confirmPw,setConfirmPw]=useState("");
  const[fW,setFW]=useState("");
  const[fR,setFR]=useState("");
  const[fDateFrom,setFDateFrom]=useState("");
  const[fDateTo,setFDateTo]=useState("");
  const fileRef=useRef(null);
  const cfgTimer=useRef(null);

  const LT={primary:"#2563eb",primaryLight:"#dbeafe",primaryDark:"#1d4ed8",success:"#059669",successLight:"#d1fae5",warn:"#d97706",warnLight:"#fef3c7",danger:"#dc2626",dangerLight:"#fee2e2",purple:"#7c3aed",purpleLight:"#ede9fe",bg:"#f1f5f9",card:"#ffffff",text:"#0f172a",muted:"#64748b",border:"#e2e8f0",dark:false};
  const DT={primary:"#60a5fa",primaryLight:"#1e3a5f",primaryDark:"#3b82f6",success:"#34d399",successLight:"#064e3b",warn:"#fbbf24",warnLight:"#451a03",danger:"#f87171",dangerLight:"#450a0a",purple:"#a78bfa",purpleLight:"#2e1065",bg:"#0c0f1a",card:"#151926",text:"#e8eaf0",muted:"#7c849b",border:"#232940",dark:true};
  const $=dark?DT:LT;
  const IS={width:"100%",border:"1.5px solid "+$.border,borderRadius:12,padding:"14px 16px",fontSize:16,outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:dark?"#1a1f30":$.card,color:$.text,WebkitAppearance:"none",transition:"border-color .2s,box-shadow .2s"};

  useEffect(()=>{(async()=>{if(!sheet.ok())return;try{const s=await sheet.get("Settings");if(s?.length>0&&s[0].users){const u=JSON.parse(s[0].users);if(Array.isArray(u)&&u.length>0)USERS=u;}}catch{}})();},[]);
  useEffect(()=>{if(!loggedIn||!sheet.ok())return;(async()=>{setLoading(true);const[w,r,t,s]=await Promise.all([sheet.get("Wholesalers"),sheet.get("Retailers"),sheet.get("Transactions"),sheet.get("Settings")]);setW(w);setR(r);setT(t);if(s?.length>0){const row=s[0];setCfg({biz:row.biz||"Fertilizer Brokerage",owner:row.owner||"",wRate:row.wRate||50,rRate:row.rRate||50});if(row.users){try{const u=JSON.parse(row.users);if(Array.isArray(u)&&u.length>0){USERS=u;const me=u.find(x=>x.username.toLowerCase()===currentUser?.username?.toLowerCase());if(me)setCurrentUser(me);}}catch{}}}setLoading(false);})();},[loggedIn]);

  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const withSave=async fn=>{setSaving(true);await fn();setSaving(false);};
  const saveCfg=nc=>{setCfg(nc);if(cfgTimer.current)clearTimeout(cfgTimer.current);cfgTimer.current=setTimeout(()=>{if(sheet.ok())sheet.put("Settings","settings",{biz:nc.biz||"",owner:nc.owner||"",wRate:nc.wRate||0,rRate:nc.rRate||0});},1500);};
  const nm=(type,id)=>(type==="w"?W:R).find(p=>p.id===id)?.name||"—";
  const gp=(type,id)=>(type==="w"?W:R).find(p=>p.id===id);
  const curMonth=new Date().getMonth();const curYear=new Date().getFullYear();
  const fyStart=curMonth>=3?curYear:curYear-1;
  const allFYs=[...new Set(T.map(t=>{if(!t.date)return null;const d=new Date(t.date);const m=d.getMonth();const y=d.getFullYear();return m>=3?y:y-1;}).filter(Boolean).concat([fyStart]))].sort().reverse();

  const renderReports=()=>{
    const wTop=W.map(w=>{const t=yT.filter(x=>x.wholesalerId===w.id);return{...w,n:t.length,b:t.reduce((s,x)=>s+Number(x.quantity||x.qty||0),0),cc:t.reduce((s,x)=>s+Number(x.wholesalerCommission||x.wc||0),0)};}).filter(w=>w.n>0).sort((a,b)=>b.b-a.b);
    const rTop=R.map(r=>{const t=yT.filter(x=>x.retailerId===r.id);return{...r,n:t.length,b:t.reduce((s,x)=>s+Number(x.quantity||x.qty||0),0),cc:t.reduce((s,x)=>s+Number(x.retailerCommission||x.rc||0),0)};}).filter(r=>r.n>0).sort((a,b)=>b.b-a.b);
    const sf=(list)=>list.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase())||p.location?.toLowerCase().includes(q.toLowerCase()));
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}><div style={{fontSize:22,fontWeight:900,color:$.text}}>Reports</div>{yrSel}</div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>{met("💼","Business",biz+" T",$.primary)}{met("💰","Commission",INR(comm),$.success)}{met("✅","Collected",yT.filter(t=>t.status==="collected").length+"/"+yT.length,$.purple)}</div>
        <div className="rg rg-2" style={{gap:16,marginBottom:16}}>
          {cd(<div><div style={{fontWeight:800,fontSize:15,color:$.text,marginBottom:10}}>Monthly</div>{mData.filter(d=>d.n>0).map((d,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid "+$.border}}><span style={{fontWeight:600,color:$.text}}>{d.m}</span><div style={{display:"flex",gap:16,fontSize:14}}><span style={{color:$.text}}>{d.biz} T</span><span style={{color:$.muted}}>{d.n} txns</span></div></div>)}{mData.filter(d=>d.n>0).length===0&&<div style={{textAlign:"center",padding:20,color:$.muted}}>No data</div>}</div>)}
          {cd(<div><div style={{fontWeight:800,fontSize:15,color:$.text,marginBottom:4}}>📄 Statements</div><div style={{fontSize:12,color:$.muted,marginBottom:12}}>Download per party</div><input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search..." style={{...IS,marginBottom:14,fontSize:14}}/>
            <div style={{fontWeight:700,fontSize:13,color:$.primary,marginBottom:8}}>Wholesalers</div>
            {sf(W).length===0?<div style={{fontSize:13,color:$.muted,marginBottom:12}}>None</div>:<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>{sf(W).map(w=>{const n=yT.filter(t=>t.wholesalerId===w.id).length;return <div key={w.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:$.bg,borderRadius:12}}><div style={{minWidth:0,overflow:"hidden"}}><span style={{fontWeight:700,fontSize:14,color:$.text}}>{w.name}</span>{w.location&&<span style={{fontSize:12,color:$.muted,marginLeft:6}}>📍{w.location}</span>}<span style={{fontSize:12,color:$.muted,marginLeft:8}}>{n}</span></div><button onClick={()=>genReport(w,"w")} disabled={n===0} style={{background:n>0?$.primary:$.border,color:n>0?"#fff":$.muted,border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:n>0?"pointer":"default",fontFamily:"inherit",flexShrink:0}}>📄</button></div>;})}</div>}
            <div style={{fontWeight:700,fontSize:13,color:$.purple,marginBottom:8}}>Retailers</div>
            {sf(R).length===0?<div style={{fontSize:13,color:$.muted}}>None</div>:<div style={{display:"flex",flexDirection:"column",gap:6}}>{sf(R).map(r=>{const n=yT.filter(t=>t.retailerId===r.id).length;return <div key={r.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:$.bg,borderRadius:12}}><div style={{minWidth:0,overflow:"hidden"}}><span style={{fontWeight:700,fontSize:14,color:$.text}}>{r.name}</span>{r.location&&<span style={{fontSize:12,color:$.muted,marginLeft:6}}>📍{r.location}</span>}<span style={{fontSize:12,color:$.muted,marginLeft:8}}>{n}</span></div><button onClick={()=>genReport(r,"r")} disabled={n===0} style={{background:n>0?$.purple:$.border,color:n>0?"#fff":$.muted,border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:n>0?"pointer":"default",fontFamily:"inherit",flexShrink:0}}>📄</button></div>;})}</div>}
          </div>,null,{border:"2px solid "+$.primaryLight})}
        </div>
        <div className="rg rg-2" style={{gap:16}}>
          {[["🏭 Top Wholesalers",wTop.slice(0,5)],["🏪 Top Retailers",rTop.slice(0,5)]].map(([title,data])=><div key={title}>{cd(<div><div style={{fontWeight:800,fontSize:15,color:$.text,marginBottom:10}}>{title}</div>{data.length===0?<div style={{textAlign:"center",padding:16,color:$.muted}}>No data</div>:data.map((p,i)=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+$.border}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:$.muted,fontSize:13,width:20}}>#{i+1}</span><span style={{fontWeight:600,color:$.text}}>{p.name}</span></div><div style={{textAlign:"right"}}><div style={{fontWeight:700,fontSize:14,color:$.text}}>{p.b} T</div><div style={{fontSize:11,color:$.success,fontWeight:600}}>{INR(p.cc)}</div></div></div>)}</div>)}</div>)}
        </div>
      </div>
    );
  };

  const renderProfile=()=>(
    <div>
      <div style={{fontSize:22,fontWeight:900,color:$.text,marginBottom:20}}>👤 Profile</div>
      {cd(<div><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:60,height:60,borderRadius:99,background:$.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:900,color:$.primary}}>{currentUser?.name?.[0]}</div><div style={{flex:1}}><div style={{fontSize:20,fontWeight:900,color:$.text}}>{currentUser?.name}</div><div style={{fontSize:13,color:$.muted}}>@{currentUser?.username}</div></div><span style={{fontSize:20,color:$.muted}}>✏️</span></div><div style={{fontSize:12,color:$.primary,fontWeight:600,marginTop:10,textAlign:"center"}}>Tap to edit</div></div>,()=>{setProfName(currentUser?.name||"");setOldPw("");setNewPw("");setConfirmPw("");setEditProfile(true);},{marginBottom:16})}
      <div className="rg rg-2" style={{gap:16,marginBottom:16}}>
        {cd(<div><div style={{fontWeight:800,color:$.text,marginBottom:16}}>Business Info</div>{inp("Business Name",{value:cfg.biz,onChange:e=>saveCfg({...cfg,biz:e.target.value})})}{inp("Owner Name",{value:cfg.owner,onChange:e=>saveCfg({...cfg,owner:e.target.value})})}<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{inp("W Comm (₹/T)",{type:"number",value:cfg.wRate,onChange:e=>saveCfg({...cfg,wRate:e.target.value})})}{inp("R Comm (₹/T)",{type:"number",value:cfg.rRate,onChange:e=>saveCfg({...cfg,rRate:e.target.value})})}</div></div>)}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {cd(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontWeight:800,color:$.text}}>🌙 Dark Mode</div><div style={{fontSize:12,color:$.muted,marginTop:2}}>Easier on eyes</div></div><button onClick={()=>setDark(!dark)} style={{width:56,height:30,borderRadius:15,border:"none",background:dark?$.primary:$.border,cursor:"pointer",position:"relative",transition:"background .2s"}}><div style={{width:24,height:24,borderRadius:12,background:"#fff",position:"absolute",top:3,left:dark?29:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></button></div>)}
          {cd(<div><div style={{fontWeight:800,color:$.danger,marginBottom:10}}>Danger Zone</div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{btn("Reset",()=>{if(confirm("Delete ALL?")){setW([]);setR([]);setT([]);setTab("home");flash("Cleared");}},$.danger,"#fff",false,true)}{btn("Logout",()=>{setLoggedIn(false);setLoginUser("");setLoginPass("");},$.bg,$.danger,false,true)}</div></div>,null,{border:"1.5px solid "+$.dangerLight})}
        </div>
      </div>
    </div>
  );

  const tabList=[{id:"home",icon:"🏠",label:"Home"},{id:"txns",icon:"💰",label:"Txns"},{id:"wholesale",icon:"🏭",label:"Wholesale"},{id:"retail",icon:"🏪",label:"Retail"},{id:"reports",icon:"📈",label:"Reports"},{id:"profile",icon:"👤",label:"Profile"}];

  return(
    <div className={dark?"dark":""} style={{minHeight:"100vh",background:$.bg,transition:"background .3s"}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:200,background:$.success,color:"#fff",padding:"10px 24px",borderRadius:14,fontWeight:700,fontSize:14,boxShadow:"0 8px 24px rgba(0,0,0,0.2)"}}>{toast}</div>}
      {loading&&<div style={{position:"fixed",inset:0,zIndex:300,background:$.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:56,marginBottom:16}}>🌾</div><div style={{fontWeight:800,fontSize:18,color:$.text}}>Loading...</div></div>}

      {/* Desktop Sidebar */}
      <div className="desktop-sidebar" style={{position:"fixed",top:0,left:0,bottom:0,width:220,background:$.card,borderRight:"1px solid "+$.border,zIndex:80,flexDirection:"column",padding:"24px 0"}}>
        <div style={{padding:"0 20px 24px",borderBottom:"1px solid "+$.border}}>
          <div style={{fontSize:28,marginBottom:4}}>🌾</div>
          <div style={{fontSize:16,fontWeight:900,color:$.text}}>{cfg.biz}</div>
          <div style={{fontSize:12,color:$.muted,marginTop:2}}>Hi {currentUser?.name}</div>
        </div>
        <div style={{flex:1,padding:"12px 10px",display:"flex",flexDirection:"column",gap:2}}>
          {tabList.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setDetail(null);setQ("");}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:"none",background:tab===t.id?($.primary+"14"):"transparent",color:tab===t.id?$.primary:$.muted,cursor:"pointer",fontSize:15,fontWeight:tab===t.id?700:500,fontFamily:"inherit",textAlign:"left",transition:"all .15s"}}>
            <span style={{fontSize:20}}>{t.icon}</span>{t.label}
          </button>)}
        </div>
        <div style={{padding:"12px 16px",borderTop:"1px solid "+$.border}}>
          <button onClick={()=>{setLoggedIn(false);setLoginUser("");setLoginPass("");}} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",color:$.danger,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:"inherit",padding:"8px 4px"}}>🚪 Logout</button>
        </div>
      </div>

      {/* Main Content */}
      <div className="main-content" style={{maxWidth:1100}}>
        {tab==="home"&&renderHome()}
        {tab==="txns"&&renderTxns()}
        {tab==="wholesale"&&renderPartyList("w")}
        {tab==="retail"&&renderPartyList("r")}
        {tab==="reports"&&renderReports()}
        {tab==="profile"&&renderProfile()}
      </div>

      {/* FAB */}
      {["home","txns","wholesale","retail"].includes(tab)&&<button className="fab-hover fab-pos" onClick={tab==="wholesale"?()=>openNewParty("w"):tab==="retail"?()=>openNewParty("r"):openNewTxn} style={{position:"fixed",zIndex:50,width:58,height:58,borderRadius:99,border:"none",background:"linear-gradient(135deg,"+$.primary+","+$.primaryDark+")",color:"#fff",fontSize:28,cursor:"pointer",boxShadow:"0 6px 20px "+$.primary+"60",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>}

      {/* Mobile Bottom Nav */}
      <div className="mobile-nav" style={{position:"fixed",bottom:0,left:0,right:0,background:$.card,borderTop:"1px solid "+$.border,zIndex:90,paddingBottom:"env(safe-area-inset-bottom)"}}>
        <div className="mobile-nav-inner">
          {tabList.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setDetail(null);setQ("");}}>
            <span className="nav-icon" style={{color:tab===t.id?$.primary:$.muted,fontSize:22}}>{t.icon}</span>
            <span className="nav-label" style={{color:tab===t.id?$.primary:$.muted}}>{t.label}</span>
            {tab===t.id&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:2,background:$.primary}}/>}
          </button>)}
        </div>
      </div>

      {/* --- MODALS --- */}
      <ModalShell open={form==="party"} title={edit?.id?"Edit":"Add "+(edit?._t==="w"?"Wholesaler":"Retailer")} onClose={closeForm} bgC={$.card} borderC={$.border} textC={$.text} mutedC={$.muted} bg={$.bg}>
        {edit&&<div>
          <div className="form-grid">
            {inp("Name *",{value:edit.name,onChange:e=>setEdit({...edit,name:e.target.value}),placeholder:"Name"})}
            {inp("Phone",{value:edit.phone,onChange:e=>setEdit({...edit,phone:e.target.value}),placeholder:"Phone",type:"tel"})}
            {inp("Location",{value:edit.location,onChange:e=>setEdit({...edit,location:e.target.value}),placeholder:"City"})}
            {inp("GST",{value:edit.gst,onChange:e=>setEdit({...edit,gst:e.target.value}),placeholder:"GST"})}
          </div>
          {inp("Notes",{value:edit.notes,onChange:e=>setEdit({...edit,notes:e.target.value}),placeholder:"Notes"})}
          <div style={{display:"flex",gap:12,marginTop:8}}>{btn("Cancel",closeForm,$.bg,$.muted,true)}{btn(edit.id?"Update":"Add",saveParty,$.primary,"#fff",true)}</div>
        </div>}
      </ModalShell>

      <ModalShell open={form==="txn"} title={edit?.id?"Edit Transaction":"New Transaction"} onClose={closeForm} bgC={$.card} borderC={$.border} textC={$.text} mutedC={$.muted} bg={$.bg} wide>
        {edit&&<div>
          <div className="form-grid">
            <div>
              {inp("Date *",{type:"date",value:edit.date,onChange:e=>setEdit({...edit,date:e.target.value})})}
              <SearchSelect label="Wholesaler *" options={W.map(w=>({v:w.id,l:w.name,loc:w.location||""}))} value={edit.wid} onChange={v=>setEdit({...edit,wid:v})} theme={$}/>
              <SearchSelect label="Retailer *" options={R.map(r=>({v:r.id,l:r.name,loc:r.location||""}))} value={edit.rid} onChange={v=>setEdit({...edit,rid:v})} theme={$}/>
              {inp("Product *",{value:edit.product,onChange:e=>setEdit({...edit,product:e.target.value}),placeholder:"DAP, Urea..."})}
            </div>
            <div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{inp("Qty (T)",{type:"number",value:edit.qty,onChange:e=>setEdit(calc({...edit,qty:e.target.value}))})}{inp("Rate (₹/T)",{type:"number",value:edit.rate,onChange:e=>setEdit(calc({...edit,rate:e.target.value}))})}</div>
              <div style={{background:$.primaryLight,borderRadius:14,padding:14,textAlign:"center",marginBottom:16}}><div style={{fontSize:12,color:$.primary,fontWeight:600}}>Amount</div><div style={{fontSize:24,fontWeight:900,color:$.primary}}>{INR(edit.amt)}</div></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{inp("W Comm ₹",{type:"number",value:edit.wc,onChange:e=>setEdit({...edit,wc:e.target.value})})}{inp("R Comm ₹",{type:"number",value:edit.rc,onChange:e=>setEdit({...edit,rc:e.target.value})})}</div>
              <div style={{background:$.successLight,borderRadius:14,padding:14,textAlign:"center",marginBottom:16}}><div style={{fontSize:12,color:$.success,fontWeight:600}}>Total Commission</div><div style={{fontSize:24,fontWeight:900,color:$.success}}>{INR(Number(edit.wc||0)+Number(edit.rc||0))}</div></div>
              {sel("Status",[{v:"pending",l:"💳 Credit"},{v:"collected",l:"✅ Collected"},{v:"cancelled",l:"❌ Cancelled"}],{value:edit.status,onChange:e=>setEdit({...edit,status:e.target.value})})}
              {inp("Notes",{value:edit.notes,onChange:e=>setEdit({...edit,notes:e.target.value}),placeholder:"Notes"})}
            </div>
          </div>
          <div style={{display:"flex",gap:12,marginTop:8}}>{btn("Cancel",closeForm,$.bg,$.muted,true)}{btn(edit.id?"Update":"Save",saveTxn,$.success,"#fff",true)}</div>
        </div>}
      </ModalShell>

      <ModalShell open={form==="bulk"} title="📥 Bulk Add Retailers" onClose={()=>{setForm(null);setBulkText("");setBulkPreview([]);}} bgC={$.card} borderC={$.border} textC={$.text} mutedC={$.muted} bg={$.bg}>
        <div style={{fontSize:13,color:$.muted,marginBottom:12}}>Upload CSV or paste: <strong>Name, Location</strong> per line.</div>
        <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFile} style={{display:"none"}}/>
        {btn("📁 Upload File",()=>fileRef.current?.click(),$.bg,$.text,true,false,{marginBottom:12,border:"2px dashed "+$.border})}
        <div style={{marginBottom:16}}><label style={{display:"block",fontSize:13,fontWeight:600,color:$.muted,marginBottom:6}}>Or paste</label><textarea value={bulkText} onChange={e=>{setBulkText(e.target.value);setBulkPreview(parseBulk(e.target.value));}} placeholder={"Ravi, Hyd\nKumar, Guntur"} style={{...IS,height:100,resize:"vertical"}}/></div>
        {bulkPreview.length>0&&<div style={{marginBottom:16}}><div style={{fontWeight:700,fontSize:14,color:$.text,marginBottom:8}}>Preview ({bulkPreview.filter(p=>!p.exists).length} new)</div><div style={{maxHeight:180,overflowY:"auto",borderRadius:12,border:"1px solid "+$.border}}>{bulkPreview.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px",borderBottom:"1px solid "+$.border,background:p.exists?$.dangerLight:$.card}}><div><span style={{fontWeight:600,fontSize:13,color:$.text}}>{p.name}</span>{p.location&&<span style={{fontSize:12,color:$.muted,marginLeft:6}}>📍{p.location}</span>}</div>{p.exists?<span style={{fontSize:11,color:$.danger,fontWeight:700}}>EXISTS</span>:<span style={{fontSize:11,color:$.success,fontWeight:700}}>NEW</span>}</div>)}</div></div>}
        <div style={{display:"flex",gap:12}}>{btn("Cancel",()=>{setForm(null);setBulkText("");setBulkPreview([]);},$.bg,$.muted,true)}{btn(bulkImporting?"...":"Import "+bulkPreview.filter(p=>!p.exists).length,doBulkImport,$.success,"#fff",true)}</div>
      </ModalShell>

      <ModalShell open={editProfile} title="Edit Profile" onClose={()=>setEditProfile(false)} bgC={$.card} borderC={$.border} textC={$.text} mutedC={$.muted} bg={$.bg}>
        {inp("Display Name",{value:profName,onChange:e=>setProfName(e.target.value),placeholder:"Name"})}
        <div style={{height:1,background:$.border,margin:"8px 0 16px"}}/>
        <div style={{fontWeight:700,fontSize:14,color:$.text,marginBottom:12}}>Change Password (optional)</div>
        {inp("Current",{type:"password",value:oldPw,onChange:e=>setOldPw(e.target.value)})}
        <div className="form-grid">{inp("New",{type:"password",value:newPw,onChange:e=>setNewPw(e.target.value)})}{inp("Confirm",{type:"password",value:confirmPw,onChange:e=>setConfirmPw(e.target.value)})}</div>
        <div style={{display:"flex",gap:12,marginTop:8}}>{btn("Cancel",()=>setEditProfile(false),$.bg,$.muted,true)}{btn("Save",saveProfile,$.primary,"#fff",true)}</div>
      </ModalShell>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
